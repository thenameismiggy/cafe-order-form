<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Order Form</title>
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 15px; background: #f5f5f5; color: #222; min-height: 100vh; }

    /* === HEADER / TABS === */
    header { background: #1a1a2e; padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; }
    header h1 { color: #fff; font-size: 1.1rem; padding: 1rem 0; white-space: nowrap; }
    .tab-nav { display: flex; gap: 0; }
    .tab-btn { background: none; border: none; color: #aaa; padding: 1rem 1.25rem; cursor: pointer; font-size: 0.95rem; border-bottom: 3px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: #fff; border-bottom-color: #e94560; }

    /* === TAB PANELS === */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* === ORDERS TAB LAYOUT === */
    #orders-tab { display: none; }
    #orders-tab.active { display: flex; height: calc(100vh - 56px); overflow: hidden; }
    .ticket-list { width: 300px; min-width: 260px; background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; display: flex; flex-direction: column; }
    .ticket-list-header { padding: 1rem; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; }
    .ticket-list-header h2 { font-size: 1rem; }
    .order-panel { flex: 1; overflow-y: auto; padding: 1.5rem; background: #f5f5f5; }

    /* === TICKET CARDS === */
    .ticket-card { padding: 0.85rem 1rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
    .ticket-card:hover:not(.served) { background: #f9f9f9; }
    .ticket-card.served { opacity: 0.5; cursor: default; }
    .ticket-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .ticket-num { font-weight: 700; font-size: 0.95rem; }
    .ticket-total { font-weight: 600; color: #333; }
    .ticket-meta { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .ticket-count { font-size: 0.8rem; color: #888; }
    .status-select { font-size: 0.78rem; border: 1px solid #ddd; border-radius: 4px; padding: 0.2rem 0.4rem; background: #fff; cursor: pointer; }

    /* === STATUS BADGES === */
    .status-badge { font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.04em; }
    .status-pending  { background: #e8e8e8; color: #555; }
    .status-preparing { background: #fff3cd; color: #856404; }
    .status-ready    { background: #d1f7d1; color: #1a6a1a; }
    .status-served   { background: #f0f0f0; color: #aaa; }

    /* === ORDER PANEL CONTENT === */
    .panel-empty { color: #888; text-align: center; padding: 3rem 1rem; }
    .panel-form { background: #fff; border-radius: 8px; padding: 1.25rem; max-width: 640px; }
    .panel-form h2 { font-size: 1rem; margin-bottom: 1rem; color: #555; }
    .menu-category { margin-bottom: 1.25rem; }
    .menu-category h3 { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid #eee; }
    .menu-item-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f5f5f5; }
    .menu-item-row:last-child { border-bottom: none; }
    .item-info { display: flex; flex-direction: column; gap: 0.15rem; }
    .item-name { font-size: 0.92rem; }
    .item-price { font-size: 0.8rem; color: #888; }
    .stepper { display: flex; align-items: center; gap: 0.5rem; }
    .stepper button { width: 28px; height: 28px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
    .stepper button:hover:not(:disabled) { background: #e0e0e0; }
    .stepper button:disabled { opacity: 0.35; cursor: not-allowed; }
    .stepper .qty { width: 28px; text-align: center; font-weight: 600; font-size: 0.92rem; }

    /* === RUNNING TOTAL === */
    .panel-total { display: flex; justify-content: space-between; align-items: center; padding: 0.85rem 0; margin-top: 0.75rem; border-top: 2px solid #eee; font-weight: 700; font-size: 1.05rem; }
    .panel-error { color: #c0392b; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
    .panel-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }

    /* === BUTTONS === */
    .btn { padding: 0.55rem 1.1rem; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-danger  { background: #e94560; color: #fff; }
    .btn-ghost   { background: #e8e8e8; color: #333; }
    .btn-sm      { padding: 0.35rem 0.75rem; font-size: 0.82rem; }
    .btn-new-order { width: 100%; padding: 0.65rem; border: 2px dashed #ccc; background: none; border-radius: 6px; color: #666; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: border-color 0.15s, color 0.15s; margin-top: auto; }
    .btn-new-order:hover { border-color: #1a1a2e; color: #1a1a2e; }
    #btn-back-mobile { display: none; }
    .draft-banner { display: none; }
    .btn:focus-visible,
    .tab-btn:focus-visible,
    .btn-new-order:focus-visible,
    .status-select:focus-visible,
    .stepper-minus:focus-visible,
    .stepper-plus:focus-visible,
    .draft-banner:focus-visible {
      outline: 2px solid #4a90e2;
      outline-offset: 2px;
    }

    /* === ADMIN TAB === */
    #admin-tab { padding: 1.5rem; max-width: 760px; }
    #admin-tab h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .add-item-form { background: #fff; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .add-item-form h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.8rem; color: #666; font-weight: 600; }
    .form-group input, .form-group select { padding: 0.45rem 0.65rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.88rem; }
    .form-group input:focus, .form-group select:focus { outline: 2px solid #1a1a2e; border-color: transparent; }
    .form-group.checkbox-group { flex-direction: row; align-items: center; gap: 0.5rem; padding-bottom: 0.45rem; }
    .form-group.checkbox-group label { margin: 0; }
    .menu-table { background: #fff; border-radius: 8px; overflow: hidden; }
    .menu-table-category { border-bottom: 2px solid #eee; }
    .menu-table-category:last-child { border-bottom: none; }
    .menu-table-category-header { padding: 0.6rem 1rem; background: #f9f9f9; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.55rem 1rem; font-size: 0.8rem; color: #888; font-weight: 600; background: #fafafa; border-bottom: 1px solid #eee; }
    td { padding: 0.6rem 1rem; font-size: 0.88rem; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    td input, td select { padding: 0.35rem 0.5rem; border: 1px solid #bbb; border-radius: 4px; font-size: 0.85rem; }
    td input[type="text"] { width: 160px; }
    td input[type="number"] { width: 70px; }
    .td-actions { display: flex; gap: 0.4rem; }

    /* === CATEGORY MANAGEMENT === */
    .category-mgmt { background: #fff; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .category-mgmt h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    .category-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.85rem; }
    .category-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0; border-bottom: 1px solid #f5f5f5; }
    .category-row:last-child { border-bottom: none; }
    .cat-name { flex: 1; font-size: 0.9rem; cursor: pointer; padding: 0.2rem 0.3rem; border-radius: 3px; }
    .cat-name:hover { background: #f5f5f5; }
    .cat-edit-input { flex: 1; padding: 0.25rem 0.4rem; border: 1px solid #bbb; border-radius: 4px; font-size: 0.88rem; }
    .cat-row-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .cat-add-row { display: flex; gap: 0.5rem; align-items: center; }
    .cat-add-row input { padding: 0.45rem 0.65rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.88rem; flex: 1; }
    .cat-add-row input:focus { outline: 2px solid #1a1a2e; border-color: transparent; }

    /* === CONFIRMATION MODAL === */
    #confirmation-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
    #confirmation-modal.open { display: flex; }
    .modal-box { background: #fff; border-radius: 10px; padding: 1.75rem; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal-box h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .modal-line-items { margin-bottom: 1rem; }
    .modal-line-item { display: flex; justify-content: space-between; padding: 0.35rem 0; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; }
    .modal-line-item:last-child { border-bottom: none; }
    .modal-total { display: flex; justify-content: space-between; padding-top: 0.75rem; border-top: 2px solid #eee; font-weight: 700; font-size: 1rem; margin-bottom: 1.25rem; }
    .modal-actions { display: flex; justify-content: flex-end; }

    /* === EMPTY STATES === */
    .empty-list { padding: 2rem 1rem; text-align: center; color: #aaa; font-size: 0.88rem; }
    .empty-table-row td { text-align: center; color: #aaa; padding: 1.5rem; }
    .form-error { color: #c0392b; font-size: 0.82rem; margin-top: 0.5rem; min-height: 1em; }
    .modal-order-num { color: #888; font-size: 0.88rem; margin-bottom: 0.75rem; }

    /* === REPORT TAB === */
    #report-tab { padding: 1.5rem; max-width: 860px; }
    .report-summary-cards { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .summary-card { background: #fff; border-radius: 8px; padding: 1.1rem 1.4rem; flex: 1; min-width: 180px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .summary-card-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 0.35rem; }
    .summary-card-value { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
    .report-section { margin-bottom: 2rem; }
    .report-section h3 { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid #eee; }
    .report-table-wrap { background: #fff; border-radius: 8px; overflow: hidden; }
    .report-table { width: 100%; border-collapse: collapse; }
    .report-table th { text-align: left; padding: 0.55rem 1rem; font-size: 0.8rem; color: #888; font-weight: 600; background: #fafafa; border-bottom: 1px solid #eee; }
    .report-table th:not(:first-child) { text-align: right; }
    .report-table td { padding: 0.6rem 1rem; font-size: 0.88rem; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    .report-table tr:last-child td { border-bottom: none; }
    .report-table td:not(:first-child) { text-align: right; color: #555; }
    .report-table .cat-header td { background: #f9f9f9; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }
    .report-orders { display: flex; flex-direction: column; gap: 0.75rem; }
    .report-order-entry { background: #fff; border-radius: 8px; padding: 0.9rem 1.1rem; }
    .report-order-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; font-weight: 700; font-size: 0.9rem; }
    .report-order-items { border-top: 1px solid #f0f0f0; padding-top: 0.5rem; }
    .report-order-line { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.87rem; color: #555; }
    .report-order-total { display: flex; justify-content: space-between; padding-top: 0.5rem; margin-top: 0.35rem; border-top: 1px solid #eee; font-weight: 700; font-size: 0.9rem; }
    .report-empty { color: #aaa; text-align: center; padding: 3rem 1rem; font-size: 0.9rem; }

    /* === REPORT DATE CONTROLS === */
    .report-date-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; padding: 0.85rem 1.1rem; background: #fff; border-radius: 8px; }
    .preset-btns { display: flex; gap: 0.4rem; }
    .preset-btn { padding: 0.35rem 0.8rem; border: 1px solid #ddd; border-radius: 20px; background: #f5f5f5; color: #555; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.12s, color 0.12s, border-color 0.12s; }
    .preset-btn:hover { background: #e8e8e8; }
    .preset-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .date-range-inputs { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; font-size: 0.85rem; color: #555; }
    .date-range-inputs label { display: flex; align-items: center; gap: 0.3rem; }
    .date-range-inputs input[type="date"] { padding: 0.3rem 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; }
    .date-range-inputs input[type="date"]:focus { outline: 2px solid #1a1a2e; border-color: transparent; }
    .report-date-group-heading { font-size: 0.85rem; font-weight: 700; color: #666; padding: 0.5rem 0 0.25rem; margin-top: 0.5rem; }

    /* === STORED RECORDS === */
    .stored-records { background: #fff; border-radius: 8px; padding: 1.25rem; margin-top: 1.5rem; }
    .stored-records h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    .stored-records-empty { color: #aaa; font-size: 0.88rem; padding: 0.5rem 0; }
    .stored-record-row { display: flex; align-items: center; gap: 0.65rem; padding: 0.45rem 0; border-bottom: 1px solid #f5f5f5; font-size: 0.9rem; }
    .stored-record-row:last-child { border-bottom: none; }
    .stored-record-list { display: flex; flex-direction: column; }
    .stored-records-actions { margin-top: 1rem; }

    /* === RESPONSIVE (≤768px) === */
    @media (max-width: 768px) {
      /* Header */
      header { gap: 0.75rem; }
      .tab-btn { padding: 0.75rem 0.85rem; }

      /* Orders tab — single-column two-view layout */
      #orders-tab.active { display: block; height: auto; overflow: visible; }
      .ticket-list { width: 100%; min-width: 0; height: calc(100vh - 56px); border-right: none; }
      .order-panel { display: none; width: 100%; height: calc(100vh - 56px); padding: 1rem; }
      #orders-tab.panel-open .ticket-list { display: none; }
      #orders-tab.panel-open .order-panel { display: block; }

      /* Back button — visible on mobile only */
      #btn-back-mobile { display: flex; align-items: center; gap: 0.3rem; margin-bottom: 1rem; }

      /* Draft banner — visible on mobile when a draft order is in progress */
      .draft-banner.draft-active { display: flex; align-items: center; justify-content: space-between; background: #fff8e1; border: 1.5px solid #f59e0b; border-radius: 6px; padding: 0.6rem 0.75rem; margin: 0.5rem 0.75rem 0; font-size: 0.85rem; font-weight: 500; color: #92400e; cursor: pointer; width: calc(100% - 1.5rem); }

      /* Admin tab */
      #admin-tab { padding: 1rem; }
      .table-scroll-wrap { overflow-x: auto; }
      td input[type="text"] { width: 120px; }

      /* Report tab */
      #report-tab { padding: 1rem; }
      .report-table-wrap { overflow-x: auto; }

      /* Modal */
      .modal-box { padding: 1.1rem; margin: 0 1rem; }
    }

    /* === FRIES FLAVOR PICKER === */
    .fries-flavor-picker { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; padding: 0.4rem 0 0.2rem 0; font-size: 0.85rem; color: #555; }
    .flavor-label { font-weight: 600; color: #444; }
    .flavor-option { display: flex; align-items: center; gap: 0.25rem; cursor: pointer; }
    .flavor-option.disabled { opacity: 0.4; cursor: not-allowed; }
    .flavor-option input { cursor: pointer; }
    .flavor-option.disabled input { cursor: not-allowed; }
    .ticket-fries-flavor { font-size: 0.78rem; color: #777; margin-top: 0.2rem; }

    /* === AUTH MODAL === */
    .auth-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .auth-modal.hidden { display: none; }
    .auth-modal-box { background: #fff; border-radius: 10px; padding: 2rem; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 0.85rem; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
    .auth-modal-box h2 { font-size: 1.15rem; color: #1a1a2e; }
    .auth-modal-sub { font-size: 0.88rem; color: #666; }
    .auth-password-input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; }
    .auth-password-input:focus { outline: 2px solid #4a90e2; outline-offset: 1px; }
    .auth-error { color: #c0392b; font-size: 0.82rem; min-height: 1.1em; }
  </style>
</head>
<body>

  <header>
    <h1>☕ Café Orders</h1>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="orders-tab">Orders</button>
      <button class="tab-btn" data-tab="admin-tab">Admin</button>
      <button class="tab-btn" data-tab="report-tab">Report</button>
    </nav>
  </header>

  <!-- ORDERS TAB -->
  <div id="orders-tab" class="active">
    <aside class="ticket-list">
      <div class="ticket-list-header">
        <h2>Active Orders</h2>
      </div>
      <button id="draft-banner" class="draft-banner"></button>
      <div id="ticket-cards"><!-- rendered by JS --></div>
      <button class="btn-new-order" id="btn-new-order">+ New Order</button>
    </aside>

    <main class="order-panel" id="order-panel">
      <p class="panel-empty">Select an order or start a new one.</p>
    </main>
  </div>

  <!-- ADMIN TAB -->
  <div id="admin-tab" class="tab-panel">
    <h2>Menu Management</h2>

    <div id="category-management"><!-- rendered by JS --></div>

    <div class="add-item-form">
      <h3>Add New Item</h3>
      <form id="add-item-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="new-name">Name</label>
            <input type="text" id="new-name" maxlength="50" required placeholder="e.g. Caramel Macchiato">
          </div>
          <div class="form-group">
            <label for="new-price">Price (₱)</label>
            <input type="number" id="new-price" min="1" step="1" required placeholder="85">
          </div>
          <div class="form-group">
            <label for="new-category">Category</label>
            <select id="new-category">
            </select>
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="new-available" checked>
            <label for="new-available">Available</label>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary">Add Item</button>
          </div>
        </div>
        <p id="add-item-error" class="form-error"></p>
      </form>
    </div>

    <div class="table-scroll-wrap">
      <div class="menu-table" id="menu-table"><!-- rendered by JS --></div>
    </div>

    <div id="stored-records"><!-- rendered by JS --></div>
  </div>

  <!-- REPORT TAB -->
  <div id="report-tab" class="tab-panel">
    <div id="report-content"><!-- rendered by JS --></div>
  </div>

  <!-- CONFIRMATION MODAL -->
  <div id="confirmation-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <h2 id="modal-title">Order Submitted</h2>
      <div id="modal-order-num" class="modal-order-num"></div>
      <div class="modal-line-items" id="modal-line-items"></div>
      <div class="modal-total">
        <span>Total</span>
        <span id="modal-total"></span>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-modal-done">Done</button>
      </div>
    </div>
  </div>

  <!-- Password Gate Modal -->
  <div id="auth-modal" class="auth-modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="auth-modal-box">
      <h2 id="auth-title">Café Order Form</h2>
      <p class="auth-modal-sub">Enter the password to continue.</p>
      <input type="password" id="auth-password-input" class="auth-password-input" placeholder="Password" autocomplete="current-password" />
      <p id="auth-error" class="auth-error" aria-live="polite"></p>
      <button class="btn btn-primary" id="auth-submit-btn">Enter</button>
    </div>
  </div>

  <script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

function showPasswordModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
  document.getElementById('auth-password-input').focus();
}

function hidePasswordModal() {
  document.getElementById('auth-modal').classList.add('hidden');
}

async function checkPassword(entered) {
  try {
    const snap = await getDoc(doc(db, 'config', 'access'));
    if (!snap.exists()) return false;
    return snap.data().password === entered;
  } catch {
    return false;
  }
}

async function handlePasswordSubmit() {
  const input = document.getElementById('auth-password-input');
  const errorEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit-btn');
  const entered = input.value;
  if (!entered) { errorEl.textContent = 'Please enter the password.'; return; }

  btn.disabled = true;
  errorEl.textContent = '';
  const ok = await checkPassword(entered);
  btn.disabled = false;

  if (ok) {
    sessionStorage.setItem('auth', 'ok');
    hidePasswordModal();
    startApp();
  } else {
    errorEl.textContent = 'Incorrect password.';
    input.value = '';
    input.focus();
  }
}

async function initFirebase() {
  await signInAnonymously(auth);
  if (sessionStorage.getItem('auth') === 'ok') {
    hidePasswordModal();
    startApp();
  } else {
    showPasswordModal();
  }
}

function startApp() {
  // Menu snapshot — updates _menuCache and _idCounter on every change
  onSnapshot(doc(db, 'config', 'menu'), snap => {
    if (!snap.exists()) return; // migrateOrSeed() will create it
    const data = snap.data();
    _menuCache = data.items;
    _idCounter = data.idCounter;
    renderMenuTable();
    renderOrderPanel();
  });

  // Categories snapshot — updates _categoriesCache on every change
  onSnapshot(doc(db, 'config', 'categories'), snap => {
    if (!snap.exists()) return;
    _categoriesCache = snap.data().list;
    renderCategorySection();
  });

  // Today's orders snapshot — updates appState.tickets on every change
  onSnapshot(doc(db, 'orders', TODAY_DATE_STR), snap => {
    if (snap.exists()) {
      const data = snap.data();
      appState.tickets = data.tickets;
      appState.nextOrderNum = data.nextOrderNum;
      appState.nextTicketId = data.nextTicketId;
    }
    // Whether or not the doc exists, re-render the ticket list
    renderTicketCards();
  });

  initTabs();
  renderOrderPanel();
  renderTicketCards();

  // Migrate from localStorage or seed defaults if Firestore is empty
  migrateOrSeed();
}

function getMenu() {

function saveMenu(menu) {
  _menuCache = menu;
  setDoc(doc(db, 'config', 'menu'), { items: menu, idCounter: _idCounter });

function nextMenuId() {

// ─── ORDER PERSISTENCE ───────────────────────────────────────────────────────
const _d = new Date();
const TODAY_KEY = 'orders_' + _d.getFullYear() + '-' +
  String(_d.getMonth() + 1).padStart(2, '0') + '-' +
  String(_d.getDate()).padStart(2, '0');
// e.g. 'orders_2026-03-27'
// NOTE: TODAY_KEY is fixed at page load. If a tab remains open past midnight,
// new orders write to the previous day's key. Staff should refresh at shift start.

const TODAY_DATE_STR = TODAY_KEY.slice(7); // e.g. '2026-03-29'

  activePreset: 'today',

function dateStr(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function datesInRange(fromStr, toStr) {
  const dates = [];
  const cur = new Date(fromStr + 'T00:00:00');
  const end = new Date(toStr + 'T00:00:00');
  while (cur <= end) {
    dates.push(
      cur.getFullYear() + '-' +
      String(cur.getMonth() + 1).padStart(2, '0') + '-' +
      String(cur.getDate()).padStart(2, '0')
    );
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

async function loadOrdersForDate(targetDateStr) {
  if (targetDateStr === TODAY_DATE_STR) return appState.tickets;
  try {
    const snap = await getDoc(doc(db, 'orders', targetDateStr));
    if (!snap.exists()) return [];
    const parsed = snap.data();
    if (
      !Array.isArray(parsed.tickets) ||
      !(Number.isInteger(parsed.nextOrderNum) && parsed.nextOrderNum >= 1) ||
      !(Number.isInteger(parsed.nextTicketId) && parsed.nextTicketId >= 1)
    ) return [];
    return parsed.tickets;
  } catch {
    return [];
  }
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function initTabs() {
  const TAB_IDS = ['orders-tab', 'admin-tab', 'report-tab'];
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tabId = btn.dataset.tab;
      // Update active button
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Update active panel
      TAB_IDS.forEach(id => {
        document.getElementById(id).classList.toggle('active', id === tabId);
      });
      // Per-tab side effects
      if (tabId === 'admin-tab') { renderMenuTable(); renderStoredRecords(); }
      if (tabId === 'report-tab') renderReportTab();
    });
  });
}

// ─── ADMIN: CATEGORY MANAGEMENT ──────────────────────────────────────────────
function renderCategorySection() {
  const cats = getCategories();
  const container = document.getElementById('category-management');

  const rowsHtml = cats.map((cat, i) => {
    const isEditing = appState.editingCategoryIndex === i;
    const upDisabled   = i === 0             ? 'disabled' : '';
    const downDisabled = i === cats.length - 1 ? 'disabled' : '';
    const delDisabled  = cats.length === 1   ? 'disabled' : '';
    const nameCell = isEditing
      ? `<input type="text" class="cat-edit-input" value="${escHtml(cat)}" data-original="${escHtml(cat)}" data-index="${i}">`
      : `<span class="cat-name" data-cat-action="start-edit" data-index="${i}">${escHtml(cat)}</span>`;
    return `
      <div class="category-row" data-index="${i}">
        ${nameCell}
        <div class="cat-row-actions">
          <button class="btn btn-sm btn-ghost" data-cat-action="up"     data-index="${i}" ${upDisabled}>↑</button>
          <button class="btn btn-sm btn-ghost" data-cat-action="down"   data-index="${i}" ${downDisabled}>↓</button>
          <button class="btn btn-sm btn-danger" data-cat-action="delete" data-index="${i}" ${delDisabled}>Delete</button>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="category-mgmt">
      <h3>Categories</h3>
      <div class="category-list">${rowsHtml}</div>
      <div class="cat-add-row">
        <input type="text" id="new-category-name" placeholder="Category name" maxlength="50">
        <button class="btn btn-sm btn-primary" id="btn-add-category">Add Category</button>
      </div>
      <p id="cat-error" class="form-error"></p>
    </div>`;

  // Delegation on category list for click actions
  container.querySelector('.category-list').addEventListener('click', e => {
    const el = e.target.closest('[data-cat-action]');
    if (!el) return;
    const action = el.dataset.catAction;
    const idx    = parseInt(el.dataset.index, 10);
    if (action === 'start-edit') {
      appState.editingCategoryIndex = idx;
      renderCategorySection();
    } else if (action === 'up') {
      moveCategoryUp(idx);
    } else if (action === 'down') {
      moveCategoryDown(idx);
    } else if (action === 'delete') {
      deleteCategoryAt(idx);
    }
  });

  // Inline edit input events
  const editInput = container.querySelector('.cat-edit-input');
  if (editInput) {
    editInput.focus();
    editInput.select();
    editInput.addEventListener('blur',    () => commitCategoryRename(editInput));
    editInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') editInput.blur();
      if (e.key === 'Escape') {
        appState.editingCategoryIndex = null;
        renderCategorySection();
      }
    });
  }

  // Add category input/button events
  document.getElementById('new-category-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAddCategory();
  });
  document.getElementById('btn-add-category').addEventListener('click', handleAddCategory);
}

function moveCategoryUp(idx) {
  const cats = getCategories();
  if (idx === 0) return;
  [cats[idx - 1], cats[idx]] = [cats[idx], cats[idx - 1]];
  saveCategories(cats);
  renderCategorySection();
}

function moveCategoryDown(idx) {
  const cats = getCategories();
  if (idx === cats.length - 1) return;
  [cats[idx], cats[idx + 1]] = [cats[idx + 1], cats[idx]];
  saveCategories(cats);
  renderCategorySection();
}

function commitCategoryRename(input) {
  const idx          = parseInt(input.dataset.index, 10);
  const originalName = input.dataset.original;
  const newName      = input.value.trim();

  appState.editingCategoryIndex = null;

  // No change
  if (newName === originalName) {
    renderCategorySection();
    return;
  }

  // Validation
  const cats = getCategories();
  if (!newName) {
    renderCategorySection();
    return;
  }
  const duplicate = cats.some((c, i) => i !== idx && c.toLowerCase() === newName.toLowerCase());
  if (duplicate) {
    renderCategorySection();
    return;
  }

  // Update menu items that reference the old name
  const menu = getMenu() || [];
  menu.forEach(item => {
    if (item.category === originalName) item.category = newName;
  });
  saveMenu(menu);

  // Update categories
  cats[idx] = newName;
  saveCategories(cats);

  renderMenuTable();
  renderOrderPanel();
}

function deleteCategoryAt(idx) {
  const cats = getCategories();
  if (cats.length === 1) return; // guard: never delete last category

  const catName  = cats[idx];
  const menu     = getMenu() || [];
  const affected = menu.filter(i => i.category === catName).length;

  if (affected > 0) {
    const ok = confirm(
      `This category has ${affected} item(s). They will not appear in the order panel until reassigned to another category. Delete anyway?`
    );
    if (!ok) return;
  }

  cats.splice(idx, 1);
  saveCategories(cats);
  renderMenuTable();
  renderOrderPanel();
}

function handleAddCategory() {
  const input   = document.getElementById('new-category-name');
  const errorEl = document.getElementById('cat-error');
  const name    = input.value.trim();

  errorEl.textContent = '';

  if (!name) {
    errorEl.textContent = 'Category name is required.';
    return;
  }

  const cats = getCategories();
  if (cats.some(c => c.toLowerCase() === name.toLowerCase())) {
    errorEl.textContent = 'A category with that name already exists.';
    return;
  }

  cats.push(name);
  saveCategories(cats);
  input.value = '';
  renderMenuTable(); // update the add-item category select and category section
}

// ─── ADMIN: RENDER MENU TABLE ─────────────────────────────────────────────────
function renderMenuTable() {
  // Populate the Add Item category select from live categories
  const catSel = document.getElementById('new-category');
  const categories = getCategories();
  catSel.innerHTML = categories.map(cat => `<option value="${escHtml(cat)}">${escHtml(cat)}</option>`).join('');

  renderCategorySection();

  const menu = getMenu() || [];
  const container = document.getElementById('menu-table');

  if (menu.length === 0) {
    container.innerHTML = '<p style="padding:1.5rem;color:#aaa;text-align:center;">No menu items yet. Add one above.</p>';
    return;
  }

  container.innerHTML = categories.map(cat => {
    const items = menu.filter(i => i.category === cat);
    if (items.length === 0) return '';
    return `
      <div class="menu-table-category">
        <div class="menu-table-category-header">${escHtml(cat)}</div>
        <table>
          <thead><tr><th>Name</th><th>Price</th><th>Available</th><th>Actions</th></tr></thead>
          <tbody>
            ${items.map(item => renderMenuRow(item)).join('')}
          </tbody>
        </table>
      </div>`;
  }).join('');
}

function renderMenuRow(item) {
  if (appState.editingRowId === item.id) {
    return `
      <tr data-id="${item.id}">
        <td><input type="text" class="edit-name" value="${escHtml(item.name)}" maxlength="50" required></td>
        <td><input type="number" class="edit-price" value="${item.price}" min="1" step="1" required></td>
        <td>
          <select class="edit-category">
            ${getCategories().map(cat => `<option value="${escHtml(cat)}" ${item.category === cat ? 'selected' : ''}>${escHtml(cat)}</option>`).join('')}
          </select>
          <input type="checkbox" class="edit-available" ${item.available ? 'checked' : ''} title="Available">
        </td>
        <td class="td-actions">
          <button class="btn btn-sm btn-primary" data-action="save-edit" data-id="${item.id}">Save</button>
          <button class="btn btn-sm btn-ghost"   data-action="cancel-edit" data-id="${item.id}">Cancel</button>
        </td>
      </tr>`;
  }
  return `
    <tr data-id="${item.id}">
      <td>${escHtml(item.name)}</td>
      <td>${formatPrice(item.price)}</td>
      <td>${item.available ? 'Yes' : 'No'}</td>
      <td class="td-actions">
        <button class="btn btn-sm btn-ghost"   data-action="edit"   data-id="${item.id}">Edit</button>
        <button class="btn btn-sm btn-danger"  data-action="delete" data-id="${item.id}">Delete</button>
      </td>
    </tr>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Dead code — superseded by #menu-table delegation listener. Uses e.currentTarget,
// which would not be the button in a delegated context — do not re-attach directly.
function handleMenuAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = parseInt(e.currentTarget.dataset.id, 10);
  if (action === 'edit')             startEditRow(id);
  else if (action === 'cancel-edit') cancelEditRow();
  else if (action === 'save-edit')   saveEditRow(id);
  else if (action === 'delete')      deleteMenuItem(id);
}

function startEditRow(id) {
  appState.editingRowId = id;
  renderMenuTable();
}

function cancelEditRow() {
  appState.editingRowId = null;
  renderMenuTable();
}

// ─── ADMIN: SAVE EDIT ROW ─────────────────────────────────────────────────────
function saveEditRow(id) {
  const row = document.querySelector(`tr[data-id="${id}"]`);
  const name  = row.querySelector('.edit-name').value.trim();
  const price = parseInt(row.querySelector('.edit-price').value, 10);
  const category = row.querySelector('.edit-category').value;
  const available = row.querySelector('.edit-available').checked;

  if (!name || name.length > 50) { row.querySelector('.edit-name').reportValidity(); return; }
  if (isNaN(price) || price < 1) { row.querySelector('.edit-price').reportValidity(); return; }

  const menu = getMenu();
  const idx = menu.findIndex(i => i.id === id);
  if (idx === -1) return;
  menu[idx] = { id, name, price, category, available };
  saveMenu(menu);
  appState.editingRowId = null;
  renderMenuTable();
}

// ─── ADMIN: DELETE MENU ITEM ──────────────────────────────────────────────────
function deleteMenuItem(id) {
  const menu = getMenu();
  const item = menu.find(i => i.id === id);
  if (!item) return;
  if (!confirm(`Delete "${item.name}"?`)) return;
  saveMenu(menu.filter(i => i.id !== id));
  appState.editingRowId = null;
  renderMenuTable();
}

// ─── ADMIN: STORED RECORDS ────────────────────────────────────────────────────
async function renderStoredRecords() {
  const container = document.getElementById('stored-records');
  container.innerHTML = `
    <div class="stored-records">
      <h3>Stored Records</h3>
      <p class="stored-records-empty">Loading…</p>
    </div>`;

  let allDates = [];
  try {
    const snap = await getDocs(collection(db, 'orders'));
    allDates = snap.docs
      .map(d => d.id)
      .filter(id => /^\d{4}-\d{2}-\d{2}$/.test(id) && id !== TODAY_DATE_STR)
      .sort((a, b) => b.localeCompare(a)); // most recent first
  } catch {
    container.innerHTML = `
      <div class="stored-records">
        <h3>Stored Records</h3>
        <p class="stored-records-empty">Could not load records.</p>
      </div>`;
    return;
  }

  if (allDates.length === 0) {
    container.innerHTML = `
      <div class="stored-records">
        <h3>Stored Records</h3>
        <p class="stored-records-empty">No previous records stored.</p>
      </div>`;
    return;
  }

  const rowsHtml = allDates.map(dateId => {
    const label = new Date(dateId + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    return `
      <div class="stored-record-row">
        <input type="checkbox" class="stored-record-cb" data-key="${escHtml(dateId)}" id="cb-${escHtml(dateId)}">
        <label for="cb-${escHtml(dateId)}">${escHtml(label)}</label>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="stored-records">
      <h3>Stored Records</h3>
      <div class="stored-record-list">${rowsHtml}</div>
      <div class="stored-records-actions">
        <button class="btn btn-danger btn-sm" id="btn-delete-records" disabled>Delete Selected</button>
      </div>
    </div>`;

  container.querySelectorAll('.stored-record-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      const anyChecked = container.querySelectorAll('.stored-record-cb:checked').length > 0;
      document.getElementById('btn-delete-records').disabled = !anyChecked;
    });
  });

  container.querySelector('#btn-delete-records').addEventListener('click', async () => {
    const checked = Array.from(container.querySelectorAll('.stored-record-cb:checked'));
    const count = checked.length;
    if (!confirm(`Delete records for ${count} day${count === 1 ? '' : 's'}? This cannot be undone.`)) return;
    await Promise.all(checked.map(cb => deleteDoc(doc(db, 'orders', cb.dataset.key))));
    renderStoredRecords();
  });
}

// ─── ADMIN: ADD ITEM FORM ─────────────────────────────────────────────────────
document.getElementById('add-item-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const nameEl  = document.getElementById('new-name');
  const priceEl = document.getElementById('new-price');
  const errorEl = document.getElementById('add-item-error');

  const name  = nameEl.value.trim();
  const price = parseInt(priceEl.value, 10);
  const category  = document.getElementById('new-category').value;
  const available = document.getElementById('new-available').checked;

  errorEl.textContent = '';
  if (!name || name.length > 50) { errorEl.textContent = 'Name is required (max 50 characters).'; return; }
  if (isNaN(price) || price < 1) { errorEl.textContent = 'Price must be at least ₱1.'; return; }

  const menu = getMenu() || [];
  menu.push({ id: nextMenuId(), name, price, category, available });
  saveMenu(menu);
  this.reset();
  document.getElementById('new-available').checked = true;
  renderMenuTable();
});

// ─── ORDER PANEL ──────────────────────────────────────────────────────────────
function computeTotal(qtys) {
  const menu = getMenu() || [];
  return menu.reduce((sum, item) => sum + (qtys[item.id] || 0) * item.price, 0);
}

function isDirty() {
  if (!appState.panelOpen) return false;
  if (appState.panelTicketId === null) {
    // new order: dirty if any qty > 0
    return Object.values(appState.panelQtys).some(q => q > 0);
  } else {
    // editing existing: dirty if any qty differs from saved
    const ticket = appState.tickets.find(t => t.id === appState.panelTicketId);
    if (!ticket) return false;
    const menu = getMenu() || [];
    return menu.some(item => (appState.panelQtys[item.id] || 0) !== (ticket.lineItems.find(l => l.itemId === item.id)?.quantity || 0));
  }
}

function renderOrderPanel() {
  const panelEl = document.getElementById('order-panel');
  if (!appState.panelOpen) {
    panelEl.innerHTML = '<p class="panel-empty">Select an order or start a new one.</p>';
    return;
  }

  const menu = getMenu() || [];
  const availableItems = menu.filter(i => i.available);
  const isEdit = appState.panelTicketId !== null;
  const ticket = isEdit ? appState.tickets.find(t => t.id === appState.panelTicketId) : null;
  const title = isEdit ? `Editing ${escHtml(ticket.orderNum)}` : 'New Order';
  const total = computeTotal(appState.panelQtys);

  if (availableItems.length === 0) {
    panelEl.innerHTML = `
      <div class="panel-form">
        <button id="btn-back-mobile" class="btn btn-ghost btn-sm">← Orders</button>
        <p style="color:#888;text-align:center;padding:2rem 0;">No items available. Add items in the Admin tab.</p>
      </div>`;
    return;
  }

  const categories = getCategories();
  const categorySections = categories.map(cat => {
    const items = availableItems.filter(i => i.category === cat);
    if (items.length === 0) return '';
    return `
      <div class="menu-category">
        <h3>${escHtml(cat)}</h3>
        ${items.map(item => {
          const qty = appState.panelQtys[item.id] || 0;
          const isFries = item.name === 'French Fries';
          const flavorPickerHtml = (isFries && qty > 0) ? `
            <div class="fries-flavor-picker">
              <span class="flavor-label">Flavor:</span>
              ${FRIES_FLAVORS.map(f => {
                const checked = appState.panelFlavors.includes(f);
                const disabled = !checked && appState.panelFlavors.length >= 2;
                return `<label class="flavor-option${disabled ? ' disabled' : ''}">
                  <input type="checkbox" class="flavor-checkbox" data-flavor="${escHtml(f)}"
                    ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}> ${escHtml(f)}
                </label>`;
              }).join('')}
            </div>` : '';
          return `
            <div class="menu-item-row">
              <div class="item-info">
                <span class="item-name">${escHtml(item.name)}</span>
                <span class="item-price">${formatPrice(item.price)}</span>
              </div>
              <div class="stepper">
                <button class="stepper-minus" data-item-id="${item.id}" ${qty === 0 ? 'disabled' : ''} aria-label="Decrease">−</button>
                <span class="qty">${qty}</span>
                <button class="stepper-plus" data-item-id="${item.id}" ${qty >= 10 ? 'disabled' : ''} aria-label="Increase">+</button>
              </div>
              ${flavorPickerHtml}
            </div>`;
        }).join('')}
      </div>`;
  }).join('');

  panelEl.innerHTML = `
    <div class="panel-form">
      <button id="btn-back-mobile" class="btn btn-ghost btn-sm">← Orders</button>
      <h2>${title}</h2>
      ${categorySections}
      <div class="panel-total">
        <span>Total</span>
        <span>${formatPrice(total)}</span>
      </div>
      <p class="panel-error" id="panel-error"></p>
      <div class="panel-actions">
        <button class="btn btn-primary" id="btn-save">Save</button>
        <button class="btn btn-success" id="btn-submit">Submit</button>
        <button class="btn btn-ghost"   id="btn-cancel">Cancel</button>
      </div>
    </div>`;

  // Stepper event listeners
  panelEl.querySelectorAll('.stepper-plus').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.itemId, 10);
      if ((appState.panelQtys[id] || 0) >= 10) return;
      appState.panelQtys[id] = (appState.panelQtys[id] || 0) + 1;
      renderOrderPanel();
    });
  });
  panelEl.querySelectorAll('.stepper-minus').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.itemId, 10);
      if ((appState.panelQtys[id] || 0) > 0) {
        appState.panelQtys[id]--;
        const menu = getMenu() || [];
        const item = menu.find(m => m.id === id);
        if (item && item.name === 'French Fries' && appState.panelQtys[id] === 0) {
          appState.panelFlavors = [];
        }
        renderOrderPanel();
      }
    });
  });

  panelEl.querySelectorAll('.flavor-checkbox').forEach(cb => {
    cb.addEventListener('change', () => {
      const flavor = cb.dataset.flavor;
      if (cb.checked) {
        if (appState.panelFlavors.length < 2) {
          appState.panelFlavors = [...appState.panelFlavors, flavor];
        }
      } else {
        appState.panelFlavors = appState.panelFlavors.filter(f => f !== flavor);
      }
      renderOrderPanel();
    });
  });
}

// ─── TICKET LIST ──────────────────────────────────────────────────────────────
function renderTicketCards() {
  const container = document.getElementById('ticket-cards');
  if (appState.tickets.length === 0) {
    container.innerHTML = '<p class="empty-list">No orders yet.</p>';
    return;
  }
  container.innerHTML = appState.tickets.map(ticket => {
    const isServed = ticket.status === 'Served';
    const itemCount = ticket.lineItems.reduce((s, l) => s + l.quantity, 0);
    const statusClass = 'status-' + ticket.status.toLowerCase();
    return `
      <div class="ticket-card ${isServed ? 'served' : ''}" data-ticket-id="${ticket.id}">
        <div class="ticket-card-top">
          <span class="ticket-num">${ticket.orderNum}</span>
          <span class="ticket-total">${formatPrice(ticket.total)}</span>
        </div>
        <div class="ticket-meta">
          <span class="ticket-count">${itemCount} item${itemCount !== 1 ? 's' : ''}</span>
          <select class="status-select ${statusClass}" data-ticket-id="${ticket.id}" ${isServed ? 'disabled' : ''}>
            ${['Pending','Preparing','Ready','Served'].map(s =>
              `<option value="${s}" ${ticket.status === s ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
        </div>
        ${(() => {
          const friesLine = ticket.lineItems.find(l => l.name === 'French Fries' && Array.isArray(l.flavors) && l.flavors.length > 0);
          return friesLine ? `<div class="ticket-fries-flavor">Fries: ${friesLine.flavors.map(escHtml).join(' / ')}</div>` : '';
        })()}
      </div>`;
  }).join('');

  renderDraftBanner();
}

function renderDraftBanner() {
  const banner = document.getElementById('draft-banner');
  if (appState.panelOpen) {
    banner.innerHTML = '<span>Draft in progress</span><span>Tap to resume →</span>';
    banner.classList.add('draft-active');
  } else {
    banner.classList.remove('draft-active');
  }
}

document.getElementById('draft-banner').addEventListener('click', () => {
  document.getElementById('orders-tab').classList.add('panel-open');
});

function updateTicketStatus(id, status) {
  const ticket = appState.tickets.find(t => t.id === id);
  if (!ticket) return;
  ticket.status = status;
  if (status === 'Served') {
    // If this ticket is open in the panel, silently discard and clear
    if (appState.panelTicketId === id) {
      closePanel();
    }
  } else if (appState.panelTicketId === id) {
    // Non-Served status change while ticket is open: re-render panel to reflect new status
    renderOrderPanel();
  }
  renderTicketCards();
  renderReportTab();
  saveOrders();
}

// ─── REPORT DATE CONTROLS ─────────────────────────────────────────────────────
function renderReportDateControlsHtml() {
  const { activePreset, fromDate, toDate } = reportState;
  return `
    <div class="report-date-controls">
      <div class="preset-btns">
        <button class="preset-btn${activePreset === 'today' ? ' active' : ''}" data-preset="today">Today</button>
        <button class="preset-btn${activePreset === 'yesterday' ? ' active' : ''}" data-preset="yesterday">Yesterday</button>
        <button class="preset-btn${activePreset === 'last7' ? ' active' : ''}" data-preset="last7">Last 7 Days</button>
      </div>
      <div class="date-range-inputs">
        <label>From <input type="date" id="report-from" value="${fromDate}"></label>
        <label>To <input type="date" id="report-to" value="${toDate}"></label>
        <button class="btn btn-sm btn-ghost" id="btn-report-apply">Apply</button>
      </div>
    </div>`;
}

function attachReportDateListeners() {
  const reportContent = document.getElementById('report-content');
  reportContent.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const preset = btn.dataset.preset;
      reportState.activePreset = preset;
      if (preset === 'today') {
        reportState.fromDate = TODAY_DATE_STR;
        reportState.toDate = TODAY_DATE_STR;
      } else if (preset === 'yesterday') {
        const y = dateStr(-1);
        reportState.fromDate = y;
        reportState.toDate = y;
      } else if (preset === 'last7') {
        reportState.fromDate = dateStr(-6);
        reportState.toDate = TODAY_DATE_STR;
      }
      renderReportTab();
    });
  });

  function updateApplyState() {
    const from = document.getElementById('report-from').value;
    const to = document.getElementById('report-to').value;
    const applyBtn = document.getElementById('btn-report-apply');
    if (applyBtn) applyBtn.disabled = !from || !to || from > to;
  }

  const fromInput = document.getElementById('report-from');
  const toInput = document.getElementById('report-to');
  if (fromInput) fromInput.addEventListener('input', updateApplyState);
  if (toInput) toInput.addEventListener('input', updateApplyState);

  const applyBtn = document.getElementById('btn-report-apply');
  if (applyBtn) {
    updateApplyState();
    applyBtn.addEventListener('click', () => {
      const from = document.getElementById('report-from').value;
      const to = document.getElementById('report-to').value;
      if (!from || !to || from > to) return;
      reportState.activePreset = null;
      reportState.fromDate = from;
      reportState.toDate = to;
      renderReportTab();
    });
  }
}

// ─── REPORT TAB ───────────────────────────────────────────────────────────────
async function renderReportTab() {
  // Guard: will be called from state mutations — skip when report tab is not visible.
  const reportPanel = document.getElementById('report-tab');
  if (!reportPanel.classList.contains('active')) return;

  const container = document.getElementById('report-content');
  const controlsHtml = renderReportDateControlsHtml();

  // Show loading state while fetching (covers multi-day and historical ranges)
  container.innerHTML = controlsHtml + '<p class="report-empty">Loading…</p>';
  attachReportDateListeners();

  const TRACKED = ['Served', 'Ready', 'Preparing'];
  const allDates = datesInRange(reportState.fromDate, reportState.toDate);
  const ticketArrays = await Promise.all(allDates.map(d => loadOrdersForDate(d)));
  const ticketsByDate = allDates
    .map((d, i) => ({ date: d, tickets: ticketArrays[i].filter(t => TRACKED.includes(t.status)) }))
    .filter(({ tickets }) => tickets.length > 0);
  const allTickets = ticketsByDate.flatMap(({ tickets }) => tickets);

  if (allTickets.length === 0) {
    container.innerHTML = controlsHtml + '<p class="report-empty">No orders for the selected period.</p>';
    attachReportDateListeners();
    return;
  }

  // ── Summary cards (aggregated) ─────────────────────────────────────────────
  function sumByStatus(status) {
    return allTickets.filter(t => t.status === status).reduce((s, t) => s + t.total, 0);
  }
  const cardsHtml = `
    <div class="report-summary-cards">
      <div class="summary-card">
        <div class="summary-card-label">Confirmed Revenue</div>
        <div class="summary-card-value">${formatPrice(sumByStatus('Served'))}</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Awaiting Pickup</div>
        <div class="summary-card-value">${formatPrice(sumByStatus('Ready'))}</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">In Preparation</div>
        <div class="summary-card-value">${formatPrice(sumByStatus('Preparing'))}</div>
      </div>
    </div>`;

  // ── Item breakdown table (aggregated) ──────────────────────────────────────
  const itemMap = {};
  const menu = getMenu() || [];
  allTickets.forEach(ticket => {
    ticket.lineItems.forEach(l => {
      if (!itemMap[l.itemId]) {
        const menuItem = menu.find(m => m.id === l.itemId);
        itemMap[l.itemId] = {
          name: l.name,
          category: menuItem ? menuItem.category : 'Other',
          Served:    { qty: 0, sub: 0 },
          Ready:     { qty: 0, sub: 0 },
          Preparing: { qty: 0, sub: 0 },
        };
      }
      const entry = itemMap[l.itemId][ticket.status];
      entry.qty += l.quantity;
      entry.sub += l.price * l.quantity;
    });
  });

  function cellHtml(entry) {
    return entry.qty === 0 ? '—' : `${entry.qty} — ${formatPrice(entry.sub)}`;
  }

  const categories = getCategories();
  let tableBody = '';
  categories.forEach(cat => {
    const items = Object.values(itemMap).filter(i => i.category === cat);
    if (items.length === 0) return;
    tableBody += `<tr class="cat-header"><td colspan="4">${escHtml(cat)}</td></tr>`;
    items.forEach(item => {
      tableBody += `
        <tr>
          <td>${escHtml(item.name)}</td>
          <td>${cellHtml(item.Served)}</td>
          <td>${cellHtml(item.Ready)}</td>
          <td>${cellHtml(item.Preparing)}</td>
        </tr>`;
    });
  });
  const otherItems = Object.values(itemMap).filter(i => !categories.includes(i.category));
  if (otherItems.length > 0) {
    tableBody += `<tr class="cat-header"><td colspan="4">Other</td></tr>`;
    otherItems.forEach(item => {
      tableBody += `
        <tr>
          <td>${escHtml(item.name)}</td>
          <td>${cellHtml(item.Served)}</td>
          <td>${cellHtml(item.Ready)}</td>
          <td>${cellHtml(item.Preparing)}</td>
        </tr>`;
    });
  }

  const tableHtml = `
    <div class="report-section">
      <h3>Item Breakdown</h3>
      <div class="report-table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Served</th>
              <th>Ready</th>
              <th>Preparing</th>
            </tr>
          </thead>
          <tbody>${tableBody}</tbody>
        </table>
      </div>
    </div>`;

  // ── Per-order list (grouped by date if multi-day) ──────────────────────────
  const statusClass = { Served: 'status-served', Ready: 'status-ready', Preparing: 'status-preparing' };

  function renderOrderEntry(ticket) {
    return `
      <div class="report-order-entry">
        <div class="report-order-header">
          <span>${escHtml(ticket.orderNum)}</span>
          <span class="status-badge ${statusClass[ticket.status] || ''}">${escHtml(ticket.status)}</span>
        </div>
        <div class="report-order-items">
          ${ticket.lineItems.map(l => {
            const flavorSuffix = (l.name === 'French Fries' && Array.isArray(l.flavors) && l.flavors.length > 0)
              ? ` (${l.flavors.map(escHtml).join(' / ')})`
              : '';
            return `
            <div class="report-order-line">
              <span>${escHtml(l.name)}${flavorSuffix} × ${l.quantity}</span>
              <span>${formatPrice(l.price * l.quantity)}</span>
            </div>`;
          }).join('')}
          <div class="report-order-total">
            <span>Total</span>
            <span>${formatPrice(ticket.total)}</span>
          </div>
        </div>
      </div>`;
  }

  let ordersInnerHtml;
  if (allDates.length === 1) {
    const sorted = allTickets.slice().sort((a, b) => parseInt(a.orderNum.slice(1), 10) - parseInt(b.orderNum.slice(1), 10));
    ordersInnerHtml = sorted.map(renderOrderEntry).join('');
  } else {
    ordersInnerHtml = ticketsByDate.map(({ date, tickets }) => {
      const sorted = tickets.slice().sort((a, b) => parseInt(a.orderNum.slice(1), 10) - parseInt(b.orderNum.slice(1), 10));
      const label = new Date(date + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      return `<div class="report-date-group-heading">${escHtml(label)}</div>` + sorted.map(renderOrderEntry).join('');
    }).join('');
  }

  const ordersHtml = `
    <div class="report-section">
      <h3>Order Details</h3>
      <div class="report-orders">${ordersInnerHtml}</div>
    </div>`;

  container.innerHTML = controlsHtml + cardsHtml + tableHtml + ordersHtml;
  attachReportDateListeners();
}

function openTicketInPanel(id) {
  if (isDirty()) {
    if (!confirm('You have an unsaved order. Discard it and start a new one?')) return;
  }
  const ticket = appState.tickets.find(t => t.id === id);
  if (!ticket) return;
  // Populate panelQtys and panelFlavors from ticket's line items
  appState.panelQtys = {};
  appState.panelFlavors = [];
  ticket.lineItems.forEach(l => {
    appState.panelQtys[l.itemId] = l.quantity;
    if (l.name === 'French Fries' && Array.isArray(l.flavors)) {
      appState.panelFlavors = [...l.flavors];
    }
  });
  appState.panelTicketId = id;
  appState.panelOpen = true;
  document.getElementById('orders-tab').classList.add('panel-open');
  renderOrderPanel();
  renderTicketCards();
}

function closePanel() {
  appState.panelOpen = false;
  appState.panelTicketId = null;
  appState.panelQtys = {};
  appState.panelFlavors = [];
  document.getElementById('orders-tab').classList.remove('panel-open');
  renderOrderPanel();
}

// ─── TICKET CARDS DELEGATION ─────────────────────────────────────────────────────────────────────────────
document.getElementById('ticket-cards').addEventListener('click', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'OPTION') return;
  const card = e.target.closest('.ticket-card:not(.served)');
  if (!card) return;
  openTicketInPanel(parseInt(card.dataset.ticketId, 10));
});

document.getElementById('ticket-cards').addEventListener('change', e => {
  const sel = e.target.closest('.status-select');
  if (!sel) return;
  updateTicketStatus(parseInt(sel.dataset.ticketId, 10), sel.value);
});

// ─── NEW ORDER BUTTON ─────────────────────────────────────────────────────────
document.getElementById('btn-new-order').addEventListener('click', () => {
  if (isDirty()) {
    if (!confirm('You have an unsaved order. Discard it and start a new one?')) return;
  }
  appState.panelTicketId = null;
  appState.panelQtys = {};
  appState.panelFlavors = [];
  appState.panelOpen = true;
  document.getElementById('orders-tab').classList.add('panel-open');
  renderOrderPanel();
  renderTicketCards();
});

// ─── PANEL ACTION HANDLERS (delegated) ───────────────────────────────────────
// Event delegation on the panel container since buttons are re-rendered on each update.
document.getElementById('order-panel').addEventListener('click', e => {
  const btn = e.target.closest('button[id]');
  if (!btn) return;
  if (btn.id === 'btn-save')        handleSave();
  if (btn.id === 'btn-submit')      handleSubmit();
  if (btn.id === 'btn-cancel')      handleCancel();
  if (btn.id === 'btn-back-mobile') { document.getElementById('orders-tab').classList.remove('panel-open'); renderDraftBanner(); } // view-switch only — preserves panel state (not a cancel)
});

function validatePanel() {
  const hasItems = Object.values(appState.panelQtys).some(q => q > 0);
  if (!hasItems) {
    const errEl = document.getElementById('panel-error');
    if (errEl) errEl.textContent = 'Add at least one item.';
    return false;
  }
  return true;
}

function buildLineItems() {
  const menu = getMenu() || [];
  return menu
    .filter(item => (appState.panelQtys[item.id] || 0) > 0)
    .map(item => ({
      itemId: item.id,
      name: item.name,
      price: item.price,
      quantity: appState.panelQtys[item.id],
      ...(item.name === 'French Fries' ? { flavors: [...appState.panelFlavors] } : {}),
    }));
}

function handleSave() {
  if (!validatePanel()) return;
  const lineItems = buildLineItems();
  const total = lineItems.reduce((s, l) => s + l.price * l.quantity, 0);

  if (appState.panelTicketId !== null) {
    // Update existing ticket
    const ticket = appState.tickets.find(t => t.id === appState.panelTicketId);
    if (ticket) {
      ticket.lineItems = lineItems;
      ticket.total = total;
    }
  } else {
    // Create new ticket
    const orderNum = '#' + String(appState.nextOrderNum++).padStart(3, '0');
    appState.tickets.push({
      id: appState.nextTicketId++,
      orderNum,
      status: 'Pending',
      lineItems,
      total,
    });
  }
  closePanel();
  renderTicketCards();
  renderReportTab();
  saveOrders();
}

function handleCancel() {
  closePanel();
  renderTicketCards();
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function handleSubmit() {
  if (!validatePanel()) return;
  const lineItems = buildLineItems();
  const total = lineItems.reduce((s, l) => s + l.price * l.quantity, 0);

  let orderNum;
  if (appState.panelTicketId !== null) {
    const ticket = appState.tickets.find(t => t.id === appState.panelTicketId);
    if (ticket) {
      ticket.lineItems = lineItems;
      ticket.total = total;
      ticket.status = 'Served';
      orderNum = ticket.orderNum;
    }
  } else {
    orderNum = '#' + String(appState.nextOrderNum++).padStart(3, '0');
    appState.tickets.push({
      id: appState.nextTicketId++,
      orderNum,
      status: 'Served',
      lineItems,
      total,
    });
  }

  closePanel();
  renderTicketCards();
  renderReportTab();
  showModal(orderNum, lineItems, total);
  saveOrders();
}

// ─── CONFIRMATION MODAL ───────────────────────────────────────────────────────
function showModal(orderNum, lineItems, total) {
  document.getElementById('modal-order-num').textContent = 'Order ' + orderNum;
  document.getElementById('modal-line-items').innerHTML = lineItems.map(l => `
    <div class="modal-line-item">
      <span>${escHtml(l.name)} × ${l.quantity}</span>
      <span>${formatPrice(l.price * l.quantity)}</span>
    </div>`).join('');
  document.getElementById('modal-total').textContent = formatPrice(total);
  document.getElementById('confirmation-modal').classList.add('open');
}

function hideModal() {
  document.getElementById('confirmation-modal').classList.remove('open');
}

document.getElementById('btn-modal-done').addEventListener('click', hideModal);

// Dismiss on backdrop click
document.getElementById('confirmation-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('confirmation-modal')) hideModal();
});

// Dismiss on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideModal();
});

// ─── INITIAL RENDER ───────────────────────────────────────────────────────────
seedMenuIfNeeded();
seedCategoriesIfNeeded();
initTabs();
renderOrderPanel();
renderTicketCards();
  </script>
</body>
</html>
